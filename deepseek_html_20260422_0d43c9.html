<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El amor de Miguel ❤️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>❤️ Miguel ❤️</h1>
            <p class="subtitulo">Pon tu nombre y descubre si eres el amor de la vida de Miguel</p>
            
            <div class="input-group">
                <label for="nombre">Tu nombre:</label>
                <input type="text" id="nombre" placeholder="Escribe aquí tu nombre" autocomplete="off">
                <button id="btnComprobar">Descubrir ✨</button>
            </div>

            <div id="mensaje" class="mensaje"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
